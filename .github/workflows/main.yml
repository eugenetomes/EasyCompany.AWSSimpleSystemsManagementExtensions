name: Publish Container to GHCR

on:
  push:
    branches:
      - main
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref_name == 'main' }}
            type=raw,value=dev,enable=${{ github.ref_name == 'dev' }}
            type=sha,format=short
            type=ref,event=branch
      
      - name: Build and publish container with dotnet
        run: |
          dotnet publish \
            --os linux \
            --arch x64 \
            -p:ContainerImageTags="${{ steps.meta.outputs.tags }}" \
            -p:ContainerRegistry="${{ env.REGISTRY }}" \
            -p:ContainerRepository="${{ env.IMAGE_NAME }}" \
            -p:PublishProfile=DefaultContainer \
            /t:PublishContainer \
            /p:Configuration=Release \
            /p:ContainerImageName="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
